<!DOCTYPE html>
<html lang="ja">

<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<meta http-equiv="Content-Style-Type" content="text/css" />
<meta http-equiv="Content-Script-Type" content="text/javascript" />

<link rel="stylesheet" href="css/default.css" type="text/css" />
<style>
.yamlblock {
  display: inline-block;
  width: 45%;
  height: calc(100vh - 100px);
  vertical-align: top;
}
.convbutton {
  border: 1px solid gray;
  border-radius: 5px;
  height: 20px;
  line-height: 1.0em;
}
</style>

<title>YAML-JSON</title>
</head>
<body>
<h4>YAML-JSON Converter</h4>
<div class="yamlblock">
  <div>YAML <input class="convbutton" type="button" value="→JSON" onclick="yaml2json(this);" /></div>
  <textarea id="yamltext" style="width:100%;height:100%;">
  aaa: 1 2 3
  bbb:
  - bb-1
  - bb-2
  ccc:
    cc-1: -1.23
    cc-2: "2-----\\n2------"
    cc-3:
    - cc-3-1
    - cc-3-2
  ddd: |
    aaa
    bbb
    ccc
  eee: 999
  </textarea>
</div>
&nbsp;
<div class="yamlblock">
  <div>JSON</div>
  <textarea id="jsontext" style="width:100%;height:100%;">
  </textarea>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/3.13.1/js-yaml.min.js"></script>
<script src="js/default.js"></script>

<script type="text/javascript">
function yaml2json(self) {
  var json = null;
  try {
    json = jsyaml.load($("#yamltext").val())
  }
  catch(err){
    alert(err)
  }
  if (json) $("#jsontext").val(JSON.stringify(json,null,2))
}
</script>

</body>
</html>
