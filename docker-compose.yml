services:
  web:
    build: .
    ports:
      # ローカルの8080番ポートをコンテナの80番に繋ぐ（ポート競合回避）
      - "8080:80"
    volumes:
      # ローカルのscフォルダをコンテナ内のhtdocs/scに同期する
      - ./sc:/usr/local/apache2/htdocs/sc
    depends_on:
      - db

  db:
    image: mariadb:10.6
    environment:
      # 構築ガイドの想定：rootパスワードなしなどはセキュリティ上良くないが手軽さのため
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: student
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
    ports:
      # XAMPPのlocalhost:8080/phpmyadminの代わりに、8081ポートにマッピング
      - "8081:80"
    depends_on:
      - db

volumes:
  db_data: